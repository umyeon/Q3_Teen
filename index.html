<!DOCTYPE html>
<html lang='ko'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>어둠 속의 목격자들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
/* ════════════════════════════════
   1. 글로벌 디자인 시스템 & 초기화
   ════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#efede8; /* 단정하고 우아한 현실 세계의 에디토리얼 베이지 */
  color:#111111;
  font-family:'Pretendard', sans-serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 거친 잔혹동화 감성을 자극하는 미세 필름 노이즈 오버레이 */
.hero-grain-texture {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  opacity: 0.04;
  pointer-events: none;
  z-index: 2;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}

/* ════════════════════════════════
   2. 시네마틱 히어로 레이아웃
   ════════════════════════════════ */
.hero{
  background:#efede8;
  padding:50px 24px 60px;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

.eyebrow-wrap{
  width:100%;
  max-width:640px;
  display:flex;
  justify-content:space-between;
  align-items: center;
  margin-bottom:40px;
  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  padding-bottom: 14px;
}
.eyebrow{
  font-size:11px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform: uppercase;
  color: #666666;
}

/* ════════════════════════════════
   3. 거대한 아치(Portal) & 흡입형 유기적 안개 애니메이션
   ════════════════════════════════ */
.portal-frame {
  position: relative;
  width: 100%;
  max-width: 500px;
  height: 640px;
  background: #000000; /* 심연 */
  border-radius: 250px 250px 0 0;
  box-shadow: 0 40px 90px rgba(0,0,0,0.25);
  overflow: hidden;
}

/* 애니메이션 레이어 A: 형광 초록 안개 */
.portal-mist-green {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  width: 130%;
  height: 50%;
  background: radial-gradient(ellipse at 50% 100%, #2fa339 0%, rgba(92, 212, 72, 0.4) 45%, transparent 75%);
  filter: blur(10px);
  animation: pulse-green 6s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
  z-index: 1;
}

/* 유혹의 보라색 흡입 광원 */
.portal-mist-purple {
  position: absolute;
  top: 10%;
  right: -10%;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(157, 51, 234, 0.65) 0%, rgba(138, 43, 226, 0.2) 50%, transparent 70%);
  filter: blur(15px);
  animation: lure-purple 7s infinite cubic-bezier(0.25, 1, 0.5, 1);
  z-index: 2;
}

/* 유혹의 핏빛 레드 흡입 광원 */
.portal-mist-red {
  position: absolute;
  bottom: 10%;
  left: -10%;
  width: 240px;
  height: 240px;
  background: radial-gradient(circle, rgba(255, 30, 30, 0.6) 0%, rgba(220, 20, 20, 0.15) 50%, transparent 70%);
  filter: blur(15px);
  animation: lure-red 6s infinite cubic-bezier(0.25, 1, 0.5, 1);
  z-index: 2;
}

@keyframes pulse-green {
  0% { transform: translateX(-50%) scaleY(0.9) translateY(10px); opacity: 0.8; }
  100% { transform: translateX(-50%) scaleY(1.1) translateY(0); opacity: 1; }
}
@keyframes lure-purple {
  0% { transform: translate(0, 0) scale(0.7); opacity: 0.1; filter: blur(25px); }
  40% { transform: translate(-60px, 40px) scale(1.2); opacity: 0.9; filter: blur(10px); }
  100% { transform: translate(-160px, 120px) scale(0.4); opacity: 0; filter: blur(30px); }
}
@keyframes lure-red {
  0% { transform: translate(0, 0) scale(0.7); opacity: 0.1; filter: blur(25px); }
  45% { transform: translate(50px, -60px) scale(1.15); opacity: 0.9; filter: blur(10px); }
  100% { transform: translate(140px, -150px) scale(0.3); opacity: 0; filter: blur(30px); }
}

/* 아치 내부 중앙 카피 */
.portal-interior-text {
  position: absolute;
  top: 36%; left: 0; right: 0;
  text-align: center;
  color: #f4f0e6;
  font-family: 'Noto Serif KR', serif;
  font-weight: 200;
  font-size: clamp(20px, 4.5vw, 25px);
  line-height: 1.9;
  letter-spacing: 0.06em;
  z-index: 5;
  text-shadow: 0 0 15px rgba(255,255,255,0.12);
  animation: text-breathing 5s infinite ease-in-out;
}

@keyframes text-breathing {
  0%, 100% { transform: translateY(0); opacity: 0.85; }
  50% { transform: translateY(-4px); opacity: 1; }
}

/* ════════════════════════════════
   4. 영문 타이틀 영역
   ════════════════════════════════ */
.portal-absolute-title {
  margin-top: 32px;
  text-align: center;
  font-family: 'Pretendard', sans-serif;
  font-weight: 900;
  font-size: clamp(16px, 4.5vw, 46px);
  color: #111111; 
  letter-spacing: -0.02em;
  text-transform: uppercase;
  line-height: 1;
  z-index: 10;
  pointer-events: none;
  white-space: nowrap;
}

/* ════════════════════════════════
   5. 에디토리얼 소개글 영역 (요구사항 2 반영: 아치와 통일감을 주는 암흑 패널 및 일렁임
