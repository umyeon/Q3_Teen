<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우면도서관 북큐레이션 | 청소년실</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 셋팅 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0c10; /* 포스터의 깊은 어둠을 표현한 블랙 */
            color: #e5e5e5;
            font-family: 'Noto Serif KR', serif; /* 소개글의 명조체 톤 유지 */
            line-height: 1.8;
            letter-spacing: -0.03em;
            overflow-x: hidden;
        }

        /* 깃허브 페이지용 메인 컨테이너 */
        .wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 상단 소속 표시 (우면도서관 북큐레이션 | 청소년실) */
        .sub-header {
            text-align: right;
            font-size: 0.85rem;
            color: #888;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 50px;
            font-family: sans-serif;
        }

        /* --- [섹션 1] 메인 비주얼 포스터 영역 --- */
        .poster-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 80px;
        }

        .poster-image-box {
            position: relative;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #1a2f23; /* 포스터의 그린 톤을 반영한 미세한 테두리 */
            margin-bottom: 30px;
        }

        .poster-image-box img {
            width: 100%;
            display: block;
        }

        /* 포스터 메인 카피 타이포그래피 구현 */
        .main-title-english {
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            margin-top: 10px;
        }

        /* --- [섹션 2] 소개글 컨텐츠 영역 (톤앤매너 완벽 재현) --- */
        .intro-section {
            display: flex;
            margin-top: 60px;
            border-top: 1px solid #1a2f23;
            padding-top: 60px;
            gap: 40px;
        }

        /* 왼쪽 버티컬 타이틀 (어둠 속의 목격자들) */
        .vertical-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            writing-mode: vertical-rl; /* 세로쓰기 구현 */
            text-orientation: upright;
            letter-spacing: 0.2em;
            line-height: 1.2;
            border-right: 2px solid #ffffff;
            padding-right: 20px;
            height: fit-content;
        }

        /* 오른쪽 소개 본문 */
        .intro-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 35px;
            font-size: 1.1rem;
            color: #b0b5b8;
            font-weight: 300;
        }

        /* 강조 문구 (어떤 문구는 서늘하고 강렬하게) */
        .intro-body p strong {
            color: #ffffff;
            font-weight: 500;
        }

        .intro-highlight {
            color: #8da399; /* 포스터 정원의 미스틱 그린 컬러에서 추출 */
            font-weight: 500;
        }

        /* 모바일 반응형 대응 */
        @media (max-width: 600px) {
            .intro-section {
                flex-direction: column;
                gap: 30px;
            }
            .vertical-title {
                writing-mode: horizontal-tb;
                border-right: none;
                border-bottom: 2px solid #ffffff;
                padding-right: 0;
                padding-bottom: 15px;
                width: 100%;
                text-align: center;
            }
            .main-title-english {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="sub-header">
            우면도서관 북큐레이션 | 청소년실
        </div>

        <section class="poster-section">
            <div class="poster-image-box">
                <img src="청소년 메인 1.png" alt="Where Secrets Grow 포스터">
            </div>
            <h1 class="main-title-english">Where Secrets Grow</h1>
        </section>

        <section class="intro-section">
            <div class="vertical-title">
                어둠 속의 목격자들
            </div>
            
            <div class="intro-body">
                <p>
                    어떤 문은 열지 않는 편이 좋습니다.<br><br>
                    어떤 이름은 부르지 않는 편이 좋고,<br>
                    어떤 비밀은 끝까지 모르는 편이 좋습니다.
                </p>
                
                <p>
                    그럼에도 우리는<br>
                    낯선 속삭임에 귀를 기울이고,<br>
                    <strong class="intro-highlight">어둠 속에 숨겨진 흔적</strong>을 바라보게 됩니다.
                </p>
                
                <p>
                    이번 북큐레이션은<br>
                    <strong>호러와 미스터리 장르의 영어원서</strong>를 통해<br>
                    설명할 수 없는 사건과 감춰진 비밀이 있는<br>
                    이야기 속으로 여러분을 초대합니다.
                </p>
            </div>
        </section>
    </div>

</body>
</html>
