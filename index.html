<!DOCTYPE html>
<html lang='ko'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Where Secrets Grow</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
body{
    margin:0;
    background:#f6f4f1;
    color:#222;
    font-family:'Pretendard',sans-serif;
}

.wrap{
    max-width:760px;
    margin:auto;
    padding:24px 16px 80px;
}

/* 청소년실 버전은 초록 원 제거 */
.hero{
    position:relative;
}

.hero:before{
    display:none;
}

.eyebrow-wrapper{
    display:flex;
    justify-content:flex-end;
}

.eyebrow{
    display:inline-flex;
    padding:8px 14px;
    border-radius:999px;
    background:#2f2f2f;
    color:#fff;
    font-size:11px;
}

.hero-title{
    font-size:57px;
    line-height:1.1;
    letter-spacing:-0.05em;
    color:#222;
    font-weight:800;
    margin:28px 0;
}

.hero-question{
    font-size:24px;
    font-weight:700;
    line-height:1.45;
    margin-top:64px;
    text-align:right;
    color:#333;
}

.hero-text{
    line-height:1.95;
    color:#444;
    text-align:right;
}

.notice{
    display:flex;
    align-items:center;
    justify-content:center;
    margin:40px 0 12px;
    padding:14px 16px;
    background:#fafaf8;
    border:1px solid #d9d9d5;
    border-radius:14px;
    font-size:13px;
    letter-spacing:-0.03em;
    white-space:nowrap;
    text-overflow:ellipsis;
    overflow:hidden;
}

.section{
    margin-top:72px;
}

.section-no{
    font-size:12px;
    color:#7a7a7a;
    letter-spacing:.18em;
}

.section-title{
    font-size:34px;
    font-weight:700;
    color:#222;
}

.section-desc{
    color:#6b6b6b;
}

.card{
    display:flex;
    gap:14px;
    align-items:center;
    background:#fafaf8;
    border:1px solid #ddd;
    border-radius:18px;
    padding:14px;
    margin:12px 0;
}

.cover{
    width:72px;
    height:102px;
    object-fit:cover;
    border-radius:10px;
}

.title{
    font-weight:700;
    margin-bottom:6px;
    line-height:1.35;
}

.author{
    font-size:14px;
    color:#6b6b6b;
    margin-bottom:4px;
}

.call{
    font-size:14px;
    color:#6b6b6b;
}
</style>
</head>

<body>

<main class='wrap'>

<section class='hero'>

<div class='eyebrow-wrapper'>
    <div class='eyebrow'>
        우면도서관 북큐레이션 ｜ 청소년실
    </div>
</div>

<h1 class='hero-title'>
Where<br>
Secrets Grow
</h1>

<p class='hero-question'>
어둠 속의 목격자들
</p>

<div class='hero-text'>

<p>
어떤 문은 열지 않는 편이 좋습니다.
</p>

<p>
어떤 이름은 부르지 않는 편이 좋고,<br>
어떤 비밀은 끝까지 모르는 편이 좋습니다.
</p>

<p>
그럼에도 우리는<br>
낯선 속삭임에 귀를 기울이고,<br>
어둠 속에 숨겨진 흔적을 바라보게 됩니다.
</p>

<p>
이번 북큐레이션은<br>
호러와 미스터리 장르의 영어원서를 통해<br>
설명할 수 없는 사건과 감춰진 비밀이 있는<br>
이야기 속으로 여러분을 초대합니다.
</p>

</div>

</section>

<div class='notice'>
📚 책 표지를 클릭하면 해당 도서를 바로 찾아볼 수 있습니다.
</div>

<!-- 아래 SECTION 01~03 및 카드 영역은 기존 코드 그대로 유지 -->

</main>

</body>
</html>
