<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우면도서관 북큐레이션 | 청소년실</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* [색상 및 폰트 중심의 기본 스타일] */
        body {
            font-family: 'Noto Serif KR', serif; /* 전체 폰트를 차분한 명조체로 변경 */
            background-color: #000000;          /* 포스터 바탕과 동일한 순수 블랙 */
            color: #ffffff;                     /* 기본 텍스트 색상은 화이트 */
            line-height: 1.8;
            margin: 0;
            padding: 20px;
        }

        /* 메인 컨테이너 (기본 블록 레이아웃) */
        .container {
            max-width: 600px; /* 기본 웹페이지 표준 너비 */
            margin: 0 auto;
            padding: 20px 0;
        }

        /* 상단 소속 안내 스타일 */
        .header-tag {
            text-align: right;
            font-size: 14px;
            color: #888888;
            margin-bottom: 40px;
        }

        /* 이미지 정렬 (기본 틀 유지) */
        .image-wrapper {
            text-align: center;
            margin-bottom: 30px;
        }
        .image-wrapper img {
            max-width: 100%;
            height: auto;
        }

        /* 텍스트 영역 스타일 */
        .content-area {
            margin-top: 40px;
            padding: 0 10px;
        }

        /* 타이틀 스타일 */
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            border-left: 3px solid #ffffff; /* 소개글 이미지의 세로선 느낌을 포인트로 차용 */
            padding-left: 15px;
        }

        /* 본문 텍스트 스타일 */
        .description-text {
            font-size: 16px;
            color: #dddddd; /* 가독성을 위한 약간 밝은 그레이 */
        }

        .description-text p {
            margin-bottom: 30px;
        }

        /* 특정 단어 강조 (포스터의 하단 그린 컬러 톤 적용) */
        .highlight {
            color: #9cb3a8; 
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-tag">우면도서관 북큐레이션 | 청소년실</div>

        <div class="image-wrapper">
            <img src="청소년 메인 1.png" alt="Where Secrets Grow">
        </div>

        <div class="content-area">
            <h2 class="title">어둠 속의 목격자들</h2>
            
            <div class="description-text">
                <p>
                    어떤 문은 열지 않는 편이 좋습니다.<br><br>
                    어떤 이름은 부르지 않는 편이 좋고,<br>
                    어떤 비밀은 끝까지 모르는 편이 좋습니다.
                </p>

                <p>
                    그럼에도 우리는<br>
                    낯선 속삭임에 귀를 기울이고,<br>
                    <span class="highlight">어둠 속에 숨겨진 흔적</span>을 바라보게 됩니다.
                </p>

                <p>
                    이번 북큐레이션은<br>
                    <strong>호러와 미스터리 장르의 영어원서</strong>를 통해<br>
                    설명할 수 없는 사건과 감춰진 비밀이 있는<br>
                    이야기 속으로 여러분을 초대합니다.
                </p>
            </div>
        </div>
    </div>

</body>
</html>
